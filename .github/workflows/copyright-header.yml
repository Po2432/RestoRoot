- name: Add copyright headers
  shell: bash
  run: |
    CURRENT_YEAR=$(date +%Y)

    if [ "$CURRENT_YEAR" = "2026" ]; then
      YEAR_TEXT="2026"
    else
      YEAR_TEXT="2026-$CURRENT_YEAR"
    fi

    PHP_JS_CSS_HEADER=$(cat <<EOF
    /*
     * Copyright (c) $YEAR_TEXT po2432
     * Repository: https://github.com/Po2432/RestoRoot
     */
    EOF
    )

    HTML_HEADER=$(cat <<EOF
    <!--
      Copyright (c) $YEAR_TEXT po2432
      Repository: https://github.com/Po2432/RestoRoot
    -->
    EOF
    )

    remove_existing_header() {
      FILE="$1"

      sed -i '/Copyright (c).*po2432/,/RestoRoot/d' "$FILE"
    }

    process_php() {
      FILE="$1"

      remove_existing_header "$FILE"

      if grep -q "^<?php" "$FILE"; then
        TEMP_FILE=$(mktemp)

        {
          read -r first_line
          echo "$first_line"
          echo
          echo "$PHP_JS_CSS_HEADER"
          echo
          cat
        } < "$FILE" > "$TEMP_FILE"

        mv "$TEMP_FILE" "$FILE"
      fi
    }

    process_html() {
      FILE="$1"

      remove_existing_header "$FILE"

      TEMP_FILE=$(mktemp)

      INSERTED=0

      while IFS= read -r line; do
        echo "$line" >> "$TEMP_FILE"

        if [ $INSERTED -eq 0 ]; then
          LOWER=$(echo "$line" | tr '[:upper:]' '[:lower:]')

          if [[ "$LOWER" == *"<!doctype html>"* ]] || [[ "$LOWER" == *"<html"* ]]; then
            echo >> "$TEMP_FILE"
            echo "$HTML_HEADER" >> "$TEMP_FILE"
            echo >> "$TEMP_FILE"
            INSERTED=1
          fi
        fi
      done < "$FILE"

      mv "$TEMP_FILE" "$FILE"
    }

    process_js_css() {
      FILE="$1"

      remove_existing_header "$FILE"

      TEMP_FILE=$(mktemp)

      {
        echo "$PHP_JS_CSS_HEADER"
        echo
        cat "$FILE"
      } > "$TEMP_FILE"

      mv "$TEMP_FILE" "$FILE"
    }

    while IFS= read -r -d '' file; do
      case "$file" in
        *.php)
          process_php "$file"
          ;;
        *.html)
          process_html "$file"
          ;;
        *.js|*.css)
          process_js_css "$file"
          ;;
      esac
    done < <(
      find . \
        -type f \
        ! -path "./.git/*" \
        ! -path "./vendor/*" \
        ! -path "./node_modules/*" \
        -print0
    )
