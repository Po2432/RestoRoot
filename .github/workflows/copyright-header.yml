name: Add Copyright Headers

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-headers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add copyright headers
        shell: bash
        run: |
          CURRENT_YEAR=$(date +%Y)

          if [ "$CURRENT_YEAR" = "2026" ]; then
            YEAR_TEXT="2026"
          else
            YEAR_TEXT="2026-$CURRENT_YEAR"
          fi

          HEADER_BLOCK="Copyright (c) $YEAR_TEXT po2432
          Repository: https://github.com/Po2432/RestoRoot"

          add_header() {
            FILE="$1"
            COMMENT_START="$2"
            COMMENT_PREFIX="$3"
            COMMENT_END="$4"

            if grep -qi "Copyright (c)" "$FILE"; then
              return
            fi

            TEMP_FILE=$(mktemp)

            {
              if [ -n "$COMMENT_END" ]; then
                echo "$COMMENT_START"
                while IFS= read -r line; do
                  echo "$COMMENT_PREFIX$line"
                done <<< "$HEADER_BLOCK"
                echo "$COMMENT_END"
              else
                while IFS= read -r line; do
                  echo "$COMMENT_PREFIX$line"
                done <<< "$HEADER_BLOCK"
              fi

              echo
              cat "$FILE"
            } > "$TEMP_FILE"

            mv "$TEMP_FILE" "$FILE"
          }

          while IFS= read -r -d '' file; do
            case "$file" in
              *.php)
                add_header "$file" "/*" " * " " */"
                ;;
              *.js)
                add_header "$file" "/*" " * " " */"
                ;;
              *.css)
                add_header "$file" "/*" " * " " */"
                ;;
              *.html)
                add_header "$file" "<!--" "  " "-->"
                ;;
            esac
          done < <(find . \
            -type f \
            ! -path "./.git/*" \
            ! -path "./vendor/*" \
            ! -path "./node_modules/*" \
            -print0)

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Add/update copyright headers"
          git push
